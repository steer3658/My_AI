<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>민지AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    .sidebar {
      width: 260px;
      background: #111827;
      border-right: 1px solid #1f2937;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }

    .sidebar-desc {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .side-btn {
      width: 100%;
      border: 1px solid #374151;
      background: #1f2937;
      color: white;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
    }

    .side-btn:hover {
      background: #273244;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0b1220;
    }

    .header {
      padding: 18px 24px;
      border-bottom: 1px solid #1f2937;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(8px);
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin: 0;
    }

    .header-subtitle {
      margin-top: 6px;
      font-size: 13px;
      color: #94a3b8;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.ai {
      justify-content: flex-start;
    }

    .message {
      max-width: min(780px, 82%);
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
    }

    .message.user {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message.ai {
      background: #1e293b;
      color: #e5e7eb;
      border: 1px solid #334155;
      border-bottom-left-radius: 6px;
    }

    .composer-wrap {
      border-top: 1px solid #1f2937;
      background: #0f172a;
      padding: 16px 18px 20px;
    }

    .composer {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: center;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 18px;
      padding: 10px;
    }

    #message {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 16px;
      padding: 8px 10px;
    }

    #message::placeholder {
      color: #6b7280;
    }

    .send-btn {
      border: none;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 12px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .send-btn:hover {
      opacity: 0.95;
    }

    .hint {
      max-width: 900px;
      margin: 10px auto 0;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 900px) {
      .sidebar {
        display: none;
      }

      .message {
        max-width: 90%;
      }

      #chat {
        padding: 18px 12px;
      }

      .composer-wrap {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">민지AI</div>
      <div class="sidebar-desc">
        나만의 개인 AI 비서<br />
        기억 기능이 켜져 있어서 이전 대화를 이어서 이해해.
      </div>

      <button class="side-btn" onclick="clearChat()">화면 지우기</button>
      <button class="side-btn" onclick="resetMemory()">기억 초기화</button>
    </aside>

    <main class="main">
      <div class="header">
        <div class="header-title">민지AI</div>
        <div class="header-subtitle">친근하고 똑부러지게, 필요한 건 단계별로</div>
      </div>

      <div id="chat">
        <div class="message-row ai">
          <div class="message ai">안녕. 나는 민지야. 궁금한 걸 편하게 물어봐.</div>
        </div>
      </div>

      <div class="composer-wrap">
        <form class="composer" onsubmit="submitMessage(event)">
          <input
            id="message"
            type="text"
            placeholder="민지AI에게 물어봐..."
            autocomplete="off"
          />
          <button class="send-btn" type="submit">전송</button>
        </form>
        <div class="hint">Enter로 전송 · 화면 지우기는 UI만 초기화 · 기억 초기화는 맥락까지 삭제</div>
      </div>
    </main>
  </div>

  <script>
    let isSending = false;

    let sessionId = localStorage.getItem("minji_session_id");
    if (!sessionId) {
      sessionId = "web-session";
      localStorage.setItem("minji_session_id", sessionId);
    }

    function submitMessage(event) {
      event.preventDefault();
      sendMessage();
    }

    function appendMessage(text, isUser) {
      const chat = document.getElementById("chat");
      const row = document.createElement("div");
      row.className = `message-row ${isUser ? "user" : "ai"}`;

      const bubble = document.createElement("div");
      bubble.className = `message ${isUser ? "user" : "ai"}`;
      bubble.textContent = text;

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;

      return bubble;
    }

    async function sendMessage() {
      if (isSending) return;

      const input = document.getElementById("message");
      const message = input.value.trim();

      if (!message) return;

      isSending = true;

      appendMessage(message, true);
      input.value = "";

      const loadingBubble = appendMessage("생각 중...", false);

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message, sessionId })
        });

        const data = await res.json();
        loadingBubble.textContent = data.reply;
      } catch (error) {
        console.error(error);
        loadingBubble.textContent = "오류가 발생했어. 다시 시도해줘.";
      } finally {
        isSending = false;
        input.focus();
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
      }
    }

    function clearChat() {
      const chat = document.getElementById("chat");
      chat.innerHTML = `
        <div class="message-row ai">
          <div class="message ai">화면만 지웠어. 나는 이전 내용은 계속 기억하고 있어.</div>
        </div>
      `;
      document.getElementById("message").focus();
    }

    async function resetMemory() {
      const chat = document.getElementById("chat");

      try {
        await fetch("/reset", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ sessionId })
        });
      } catch (error) {
        console.error(error);
      }

      chat.innerHTML = `
        <div class="message-row ai">
          <div class="message ai">기억까지 초기화했어. 이제 완전히 새 대화야.</div>
        </div>
      `;
      document.getElementById("message").focus();
    }
  </script>
</body>
</html>
